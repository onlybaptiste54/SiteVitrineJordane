services:
  vendreavecmerino:
    build: .
    container_name: vendreavecmerino
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.merinoVente.rule=Host(`vendreavecmerino.com`) || Host(`www.vendreavecmerino.com`)"
      - "traefik.http.routers.merinoVente.entrypoints=websecure"
      - "traefik.http.routers.merinoVente.tls=true"
      - "traefik.http.routers.merinoVente.tls.certresolver=mytlschallenge"
      # Redirect www → apex
      - "traefik.http.middlewares.merinoVente-www.redirectregex.regex=^https://www\\.vendreavecmerino\\.com/(.*)"
      - "traefik.http.middlewares.merinoVente-www.redirectregex.replacement=https://vendreavecmerino.com/$${1}"
      - "traefik.http.middlewares.merinoVente-www.redirectregex.permanent=true"
      - "traefik.http.routers.merinoVente.middlewares=merinoVente-www@docker"
      - "traefik.http.services.merinoVente.loadbalancer.server.port=3000"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.merinoVente-http.rule=Host(`vendreavecmerino.com`) || Host(`www.vendreavecmerino.com`)"
      - "traefik.http.routers.merinoVente-http.entrypoints=web"
      - "traefik.http.middlewares.merinoVente-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.merinoVente-https.redirectscheme.permanent=true"
      - "traefik.http.routers.merinoVente-http.middlewares=merinoVente-https@docker"
      - "traefik.docker.network=n8n-stack_default"

networks:
  traefik_net:
    external: true
    name: n8n-stack_default
